name: Windows Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-minhook-x64-windows-static

      - name: Create vcpkg binary cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          }

          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Install MinHook
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install minhook:x64-windows-static
          & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

      - name: Build solution
        shell: pwsh
        run: msbuild plex_loadfile_hook.sln /m /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM

      - name: Stage release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "x64\Release\d3d11.dll" "release\d3d11.dll"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/d3d11.dll
